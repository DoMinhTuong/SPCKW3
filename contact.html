<!-- Contact Content -->
<div class="main-content">
  <div class="contact-container">
    <!-- Left -->
    <div class="contact-info">
      <p class="contact-tag">CONTACT ECHOWAVE</p>

      <h1>Liên hệ & phản hồi</h1>

      <p class="contact-description">
        Nếu bạn gặp lỗi, muốn đề xuất tính năng mới hoặc muốn gửi phản
        hồi về trải nghiệm sử dụng Echowave, hãy gửi thông tin cho chúng tôi.
      </p>

      <div class="info-box">
        <div class="info-item">
          <span>📧</span>
          <div>
            <h3>Email</h3>
            <p>support@echowave.com</p>
          </div>
        </div>

        <div class="info-item">
          <span>📞</span>
          <div>
            <h3>Phone</h3>
            <p>+84 912 345 678</p>
          </div>
        </div>

        <div class="info-item">
          <span>🌍</span>
          <div>
            <h3>Website</h3>
            <p>www.echowave.com</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Right -->
    <div class="contact-form-wrapper">
      <form class="contact-form">
        <div class="input-row">
          <div class="input-box">
            <label>Họ và tên</label>
            <input type="text" placeholder="Nhập tên của bạn" />
          </div>

          <div class="input-box">
            <label>Email</label>
            <input type="email" placeholder="example@gmail.com" />
          </div>
        </div>

        <div class="input-box">
          <label>Chủ đề</label>
          <input type="text" placeholder="Ví dụ: Báo lỗi giao diện..." />
        </div>

        <div class="input-box">
          <label>Nội dung phản hồi</label>
          <textarea
            rows="7"
            placeholder="Nhập nội dung phản hồi của bạn..."
          ></textarea>
        </div>

        <button type="submit" class="send-btn">
          Gửi phản hồi
        </button>
      </form>
    </div>
  </div>
</div>
