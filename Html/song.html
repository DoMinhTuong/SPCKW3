<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Song Search</title>
  <link rel="stylesheet" href="../Css/style.css">
</head>
<body>

<div class="container">

  <h2>Search up a song</h2>

  <input type="text" id="artist" placeholder="Artist name">
  <input type="text" id="track" placeholder="Song title">
  <button id="searchBtn">Search</button>

  <div id="result" style="margin-top:20px"></div>

</div>

<script>
const API_URL = "https://theaudiodb.com/api/v1/json/1/searchtrack.php";

const artistInput = document.getElementById("artist");
const trackInput = document.getElementById("track");
const resultDiv = document.getElementById("result");
const searchBtn = document.getElementById("searchBtn");

searchBtn.addEventListener("click", searchSong);

async function searchSong(){

  const artist = artistInput.value.trim();
  const track = trackInput.value.trim();

  if(!artist || !track){
    resultDiv.innerHTML = "<p>Please enter artist and song title.</p>";
    return;
  }

  try{

    const url = `${API_URL}?s=${encodeURIComponent(artist)}&t=${encodeURIComponent(track)}`;

    const response = await fetch(url);

    if(!response.ok){
      throw new Error("API request failed");
    }

    const data = await response.json();

    if(!data.track){
      resultDiv.innerHTML = "<p>No song found.</p>";
      return;
    }

    const song = data.track[0];

    resultDiv.innerHTML = `
      <h3>${song.strTrack}</h3>
      <p><strong>Artist:</strong> ${song.strArtist}</p>
      <p><strong>Album:</strong> ${song.strAlbum || "Unknown"}</p>
      <p><strong>Genre:</strong> ${song.strGenre || "Unknown"}</p>
      ${song.strTrackThumb ? `<img src="${song.strTrackThumb}" style="width:100%;margin-top:10px;border-radius:6px">` : ""}
    `;

  }catch(err){

    resultDiv.innerHTML = "<p>Error fetching song data.</p>";
    console.error(err);

  }
}
</script>

</body>
</html>
