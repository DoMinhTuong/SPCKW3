<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile - Echowave</title>

    <!-- FIXED CSS PATHS -->
    <link rel="stylesheet" href="/Css/style.css" />
    <link rel="stylesheet" href="/Css/mainmenu.css" />
  </head>

  <body class="mainmenu-page">
    <!-- Navbar -->
    <div class="navbar">
      <div class="nav-left">
        <h1>Echowave</h1>
      </div>

      <div class="nav-right">
        <div class="inputgroup">
          <input required="" type="text" class="input" />
          <span class="highlight"></span>
          <span class="bar"></span>
          <label>Tìm kiếm nhạc</label>
        </div>
        <button class="search-button">Search🔍</button>
        <img
          src="/Img/dpfp.jpg"
          alt="User Avatar"
          id="userAvatar"
          onclick="location.href = 'profile.html'"
        />
      </div>
      <script> /*chuyển về tran profile khi bấm vào avatar*/
        firebase.auth().onAuthStateChanged((user) => {
          if (user) {
            const avatar = document.getElementById("userAvatar");

            if (user.photoURL) {
              avatar.src = user.photoURL;
            }
          }
        });
      </script>
    </div>

    <!-- Layout -->
    <div class="layout">
      <!-- Sidebar -->
      <div class="sidebar">
        <!-- Tren (Top buttons) -->

        <button id="homeBtn" class="animated-button">
          <svg viewBox="0 0 24 24" class="arr-2" xmlns="http://www.w3.org/2000/svg">
            <path d="M16.1716 10.9999L10.8076 5.63589L12.2218 4.22168L20 11.9999L12.2218 19.778L10.8076 18.3638L16.1716 12.9999H4V10.9999H16.1716Z"></path>
          </svg>
          <span class="text">Trang chính</span>
          <span class="circle"></span>
          <svg viewBox="0 0 24 24" class="arr-1" xmlns="http://www.w3.org/2000/svg">
            <path d="M16.1716 10.9999L10.8076 5.63589L12.2218 4.22168L20 11.9999L12.2218 19.778L10.8076 18.3638L16.1716 12.9999H4V10.9999H16.1716Z"></path>
          </svg>
        </button>

        <button id="searchBtn" class="animated-button">
          <svg viewBox="0 0 24 24" class="arr-2" xmlns="http://www.w3.org/2000/svg">
            <path d="M16.1716 10.9999L10.8076 5.63589L12.2218 4.22168L20 11.9999L12.2218 19.778L10.8076 18.3638L16.1716 12.9999H4V10.9999H16.1716Z"></path>
          </svg>
          <span class="text">Tìm kiếm</span>
          <span class="circle"></span>
          <svg viewBox="0 0 24 24" class="arr-1" xmlns="http://www.w3.org/2000/svg">
            <path d="M16.1716 10.9999L10.8076 5.63589L12.2218 4.22168L20 11.9999L12.2218 19.778L10.8076 18.3638L16.1716 12.9999H4V10.9999H16.1716Z"></path>
          </svg>
        </button>

        <button id="playlistBtn" class="animated-button">
          <svg viewBox="0 0 24 24" class="arr-2" xmlns="http://www.w3.org/2000/svg">
            <path d="M16.1716 10.9999L10.8076 5.63589L12.2218 4.22168L20 11.9999L12.2218 19.778L10.8076 18.3638L16.1716 12.9999H4V10.9999H16.1716Z"></path>
          </svg>
          <span class="text">Danh sách phát</span>
          <span class="circle"></span>
          <svg viewBox="0 0 24 24" class="arr-1" xmlns="http://www.w3.org/2000/svg">
            <path d="M16.1716 10.9999L10.8076 5.63589L12.2218 4.22168L20 11.9999L12.2218 19.778L10.8076 18.3638L16.1716 12.9999H4V10.9999H16.1716Z"></path>
          </svg>
        </button>

        <button id="profileBtn" class="animated-button">
          <svg viewBox="0 0 24 24" class="arr-2" xmlns="http://www.w3.org/2000/svg">
            <path d="M16.1716 10.9999L10.8076 5.63589L12.2218 4.22168L20 11.9999L12.2218 19.778L10.8076 18.3638L16.1716 12.9999H4V10.9999H16.1716Z"></path>
          </svg>
          <span class="text">Profile</span>
          <span class="circle"></span>
          <svg viewBox="0 0 24 24" class="arr-1" xmlns="http://www.w3.org/2000/svg">
            <path d="M16.1716 10.9999L10.8076 5.63589L12.2218 4.22168L20 11.9999L12.2218 19.778L10.8076 18.3638L16.1716 12.9999H4V10.9999H16.1716Z"></path>
          </svg>
        </button>

        <button id="contactBtn" class="animated-button">
          <svg viewBox="0 0 24 24" class="arr-2" xmlns="http://www.w3.org/2000/svg">
            <path d="M16.1716 10.9999L10.8076 5.63589L12.2218 4.22168L20 11.9999L12.2218 19.778L10.8076 18.3638L16.1716 12.9999H4V10.9999H16.1716Z"></path>
          </svg>
          <span class="text">Phản hồi</span>
          <span class="circle"></span>
          <svg viewBox="0 0 24 24" class="arr-1" xmlns="http://www.w3.org/2000/svg">
            <path d="M16.1716 10.9999L10.8076 5.63589L12.2218 4.22168L20 11.9999L12.2218 19.778L10.8076 18.3638L16.1716 12.9999H4V10.9999H16.1716Z"></path>
          </svg>
        </button>
      </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>

    <!-- FIXED SCRIPT PATHS -->
    <script src="../Script/firebase-config.js"></script>
    <script src="../Script/mainmenu.js"></script>

    <!-- Footer (MOVED INSIDE BODY — IMPORTANT) -->

      <div class="footer-container">
        <div class="footer-section">
          <p style="color: aliceblue; font-size: 20px">Echowave</p>
          <p style="font-size: 15px;">Khám phá, nghe và trải nghiệm những bài nhạc mới</p>
        </div>

        <div class="footer-section">
          <p style="color: aliceblue; font-size: 20px">Điều hướng</p>
          <ul>
            <li><a href="index.html">Trang chính</a></li>
            <li><a href="playlist.html">Danh sách phát</a></li>
            <li><a href="profile.html">Trang cá nhân</a></li>
          </ul>
        </div>

        <div class="footer-section">
          <p style="color: aliceblue; font-size: 20px">Phản hồi</p>
          <ul>
            <li><a href="contact.html">Liên hệ</a></li>
            <p style="font-size: 15px;">+84 912 345 678</p>
          </ul>
        </div>
      </div>

      <div class="footer-bottom">
        <p>© 2026 Echowave. All rights reserved.</p>
      </div>
    </footer>
  </body>
</html>
